<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1100">
<title>PokeLight Slider Pokemon</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/Swiper/4.5.1/css/swiper.min.css">
<link href="https://fonts.googleapis.com/css?family=Dosis:400,600,700,800" rel="stylesheet">
<style>
@font-face {
  font-family: 'Uni Sans';
  src: url('https://res.cloudinary.com/muhammederdem/raw/upload/v1536168547/unisans-font/UniSansHeavyCAPS.woff2') format('woff2'),
       url('https://res.cloudinary.com/muhammederdem/raw/upload/v1536168547/unisans-font/UniSansHeavyCAPS.woff') format('woff'),
       url('https://res.cloudinary.com/muhammederdem/raw/upload/v1536168548/unisans-font/UniSansHeavyCAPS.ttf') format('truetype');
  font-weight: 900; font-style: normal;
}
@font-face {
  font-family: 'Uni Sans';
  src: url('https://res.cloudinary.com/muhammederdem/raw/upload/v1536168545/unisans-font/UniSansThinCAPS.woff2') format('woff2'),
       url('https://res.cloudinary.com/muhammederdem/raw/upload/v1536168545/unisans-font/UniSansThinCAPS.woff') format('woff'),
       url('https://res.cloudinary.com/muhammederdem/raw/upload/v1536168548/unisans-font/UniSansThinCAPS.ttf') format('truetype');
  font-weight: 500; font-style: normal;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Uni Sans', sans-serif; font-weight: 500; }
img { max-width: 100%; }
a { text-decoration: none; }

.icon { display: inline-block; width: 1em; height: 1em; stroke-width: 0; stroke: currentColor; fill: currentColor; }
.hidden { display: none; }

.wrapper {
  width: 100%; height: 100vh; min-height: 750px;
  background: radial-gradient(ellipse at 20% 50%, #1a0a2e 0%, #0a0a1a 50%, #0d0a1f 100%);
  position: relative; overflow: visible; display: flex;
}
.wrapper::before {
  content: ''; position: absolute; inset: 0; pointer-events: none;
  background:
    radial-gradient(ellipse 600px 400px at 10% 60%, rgba(139,0,0,0.25) 0%, transparent 70%),
    radial-gradient(ellipse 400px 300px at 80% 30%, rgba(80,0,120,0.3) 0%, transparent 70%),
    radial-gradient(ellipse 300px 300px at 50% 80%, rgba(180,0,50,0.15) 0%, transparent 70%),
    radial-gradient(ellipse 200px 200px at 70% 70%, rgba(100,0,180,0.2) 0%, transparent 60%);
}
.wrapper::after {
  content: ''; position: absolute; inset: 0; pointer-events: none;
  background-image:
    radial-gradient(circle 1px at 15% 20%, rgba(255,255,255,0.4) 0%, transparent 100%),
    radial-gradient(circle 1px at 35% 10%, rgba(255,255,255,0.3) 0%, transparent 100%),
    radial-gradient(circle 1px at 55% 25%, rgba(255,255,255,0.5) 0%, transparent 100%),
    radial-gradient(circle 1px at 75% 15%, rgba(255,255,255,0.2) 0%, transparent 100%),
    radial-gradient(circle 1px at 90% 35%, rgba(255,255,255,0.4) 0%, transparent 100%),
    radial-gradient(circle 2px at 30% 70%, rgba(200,50,255,0.4) 0%, transparent 100%),
    radial-gradient(circle 2px at 60% 40%, rgba(255,50,100,0.3) 0%, transparent 100%),
    radial-gradient(circle 2px at 20% 90%, rgba(100,100,255,0.4) 0%, transparent 100%);
}

.content {
  height: 600px; margin: auto; width: 100%; max-width: 1050px;
  display: flex; align-items: center; position: relative; padding: 0 80px;
}

.bg-shape {
  height: 100%;
  background-image: linear-gradient(-45deg, #cc3843 0%, #cb193f 100%);
  box-shadow: 0px 30px 139px 0px rgba(10,22,31,0.26);
  border-radius: 30px; padding: 45px 40px; width: 50%;
  position: absolute; top: 0; left: 0; display: flex; align-items: center;
}
.bg-shape img {
  object-fit: contain; width: 510px; display: block; object-position: left center;
  opacity: .2; transform: rotate(-90deg) translateY(-50%); max-width: inherit;
  left: 10px; position: absolute;
}

.next, .prev {
  z-index: 100; display: inline-flex; border: none;
  width: 61px; height: 61px; border-radius: 50%;
  justify-content: center; align-items: center; font-size: 25px;
  position: absolute; top: 50%; outline: none; cursor: pointer;
  background: #fff; color: #333; transition: opacity .3s;
  box-shadow: 0 4px 20px rgba(0,0,0,0.4);
}
.next.disabled, .prev.disabled { cursor: not-allowed; opacity: 0.4; }
.next:focus, .prev:focus { outline: none; }
.prev { left: 0; transform: translate(-50%, -50%); }
.next { right: 0; transform: translate(50%, -50%); }

.product-slider {
  width: 75%; height: 85%; border-radius: 30px;
  box-shadow: 0 28px 79px 0 rgba(10,22,31,0.35);
  position: absolute; top: 50%; right: 0; transform: translateY(-50%);
}
.product-slider__wrp { height: 100%; }
.product-slider__item { position: relative; height: 100%; width: 100%; }

.product-slider__item.swiper-slide-active .product-slider__content > * { opacity: 1; transform: none; }
.product-slider__item.swiper-slide-active .product-slider__content > *:nth-child(1) { transition-delay: 0s; }
.product-slider__item.swiper-slide-active .product-slider__content > *:nth-child(2) { transition-delay: 0.2s; }
.product-slider__item.swiper-slide-active .product-slider__content > *:nth-child(3) { transition-delay: 0.4s; }
.product-slider__item.swiper-slide-active .product-slider__content > *:nth-child(4) { transition-delay: 0.6s; }

.product-slider__card {
  height: 100%; display: flex; align-items: center; width: 100%;
  transition: all .5s; overflow: hidden; position: relative; border-radius: 30px;
}
.product-slider__cover {
  border-radius: 30px; position: absolute; top: 0; left: 0;
  width: 100%; height: 100%; display: block; object-fit: cover;
}
.product-slider__content {
  color: #fff; padding-top: 1px; position: relative; z-index: 2;
  width: 100%; padding-left: 250px; padding-right: 80px;
}
.product-slider__title {
  margin: 0; margin-bottom: 10px; font-weight: 900; font-size: 41px;
  line-height: 1.2em; letter-spacing: 2px; opacity: 0;
  transform: translateY(55px); transition: all .5s;
}
.product-slider__price {
  display: block; font-size: 42px; opacity: 0;
  transform: translateY(55px); transition: all .5s;
}
.product-slider__price sup { font-size: 55%; position: relative; top: 0; vertical-align: middle; }

.product-slider__cart {
  box-shadow: 0 7px 99px 0 rgba(204,51,66,0.6);
  background-image: linear-gradient(-45deg, rgb(204,56,67) 0%, rgb(203,25,63) 100%);
  border: none; color: #fff; padding: 10px 30px; border-radius: 50px;
  min-height: 50px; font-weight: 700; font-size: 14px; letter-spacing: 2px;
  margin-right: 40px; cursor: pointer; font-family: 'Uni Sans', sans-serif;
}
.product-slider__fav {
  color: #888e94; background: none; border: none; position: relative;
  padding-left: 25px; outline: none; cursor: pointer;
  font-family: 'Uni Sans', sans-serif; font-size: 13px; letter-spacing: 1px;
}
.product-slider__fav:focus { outline: none; }
.heart {
  display: block; position: absolute; left: 0;
  transform: translate(-50%, -50%) scale(0.7); top: 50%;
  pointer-events: none; width: 100px; height: 100px;
  background: url("https://res.cloudinary.com/muhammederdem/image/upload/v1536405215/starwars/heart.png") no-repeat;
  background-position: 0 0; cursor: pointer;
  transition: background-position 1s steps(28); transition-duration: 0s;
}
.heart.is-active { transition-duration: 1s; background-position: -2800px 0; }
.product-slider__bottom {
  margin-top: 20px; opacity: 0; transform: translateY(55px);
  transition: all .5s; display: flex; align-items: center;
}
.product-ctr {
  display: flex; align-items: center; min-height: 150px; margin-top: 40px;
  opacity: 0; transform: translateY(55px); transition: all .5s;
}
.hr-vertical { width: 1px; background: #9fa3a7; align-self: stretch; margin: 0 35px; flex-shrink: 0; opacity: .5; }
.product-labels__checkbox { display: none; }
.product-labels__checkbox:checked + .product-labels__txt { border-color: #cc3743; padding: 10px 13px; }
.product-labels__title { font-family: 'Dosis', sans-serif; font-weight: 700; letter-spacing: 3px; font-size: 16px; margin-bottom: 10px; }
.product-labels__group { display: flex; margin-bottom: 15px; }
.product-labels__group:last-child { margin-bottom: 0; }
.product-labels__item { margin: 5px; cursor: pointer; }
.product-labels__item:first-child { margin-left: 0; }
.product-labels__txt { display: block; border: 2px solid transparent; font-size: 14px; padding: 10px 20px; padding-left: 0; border-radius: 50px; transition: all .3s; letter-spacing: 2px; }
@keyframes progress { 0% { stroke-dasharray: 0 300; } }
.product-inf { text-align: center; }
.product-inf__title { font-family: 'Dosis', sans-serif; font-weight: 700; letter-spacing: 2px; font-size: 18px; }
.product-img {
  position: absolute; z-index: 2; width: 500px; left: 25%;
  transform: translateX(-45%); max-height: 500px; height: 100%; pointer-events: none;
}
.product-img__item {
  display: flex; align-items: center; position: absolute; pointer-events: none;
  user-select: none; top: 50%; right: 0;
  transform: translateY(-50%) translateX(-130px); opacity: 0; transition: all .3s;
  width: 100%; height: 100%;
}
.product-img__item.active { opacity: 1; transform: translateY(-50%) translateX(0); transition-delay: .3s; }
.product-img__item img { object-fit: contain; object-position: center right; width: 100%; height: 100%; }
.swiper-container-fade .swiper-slide { pointer-events: none; }
.swiper-container-fade .swiper-slide-active { pointer-events: auto; }
</style>
</head>

<script src="https://cdnjs.cloudflare.com/ajax/libs/Swiper/4.5.1/js/swiper.min.js"></script>
<script>
var swiper = new Swiper('.product-slider', {
  spaceBetween: 30,
  effect: 'fade',
  loop: true,
  autoplay: { delay: 3500, disableOnInteraction: false },
  navigation: { nextEl: '.next', prevEl: '.prev' },
  on: {
    init: function() {
      var index = this.activeIndex;
      var target = $('.product-slider__item').eq(index).data('target');
      $('.product-img__item').removeClass('active');
      $('#' + target).addClass('active');
    }
  }
});
swiper.on('slideChange', function() {
  var index = this.activeIndex;
  var target = $('.product-slider__item').eq(index).data('target');
  $('.product-img__item').removeClass('active');
  $('#' + target).addClass('active');
  if (swiper.isEnd) { $('.prev').removeClass('disabled'); $('.next').addClass('disabled'); }
  else { $('.next').removeClass('disabled'); }
  if (swiper.isBeginning) { $('.prev').addClass('disabled'); }
  else { $('.prev').removeClass('disabled'); }
});
$('.js-fav').on('click', function() { $(this).find('.heart').toggleClass('is-active'); });
</script>
